name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check relative markdown links resolve
        run: |
          set -euo pipefail
          broken=0
          for f in $(find . -name '*.md' -not -path './.git/*'); do
            dir=$(dirname "$f")
            while read -r link; do
              [ -z "$link" ] && continue
              if [ ! -f "$dir/$link" ]; then
                echo "BROKEN LINK: $f -> $link"
                broken=1
              fi
            done < <(grep -oE '\]\((\./)?[A-Za-z0-9._/-]+\.md' "$f" | sed 's/](//' || true)
          done
          exit $broken
